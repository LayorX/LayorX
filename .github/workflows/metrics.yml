name: Metrics Achievements

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Achievements Metrics
        uses: lowlighter/metrics@latest
        with:
          # Token 設定
          token: ${{ secrets.GITHUB_TOKEN }}
          
          # 基本設定
          user: ${{ github.repository_owner }}
          template: classic
          base: header # 加入最基本的 Header 資訊，增加穩定性
          filename: github-metrics-achievements.svg
          
          # 成就插件 (簡化版，確保不噴錯)
          plugin_achievements: yes
          plugin_achievements_display: detailed
          
          # 內建推送
          output_action: commit
          committer_branch: output
          committer_message: "chore: update achievements metrics"
          
          # 全域設定
          config_timezone: Asia/Taipei
          config_order: achievements
          
          # 除錯模式 (萬一失敗可以看到更多資訊)
          debug: yes
