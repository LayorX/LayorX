name: Metrics Achievements

on:
  schedule:
    - cron: "0 22 * * *" # Runs daily at 22:00 UTC
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Achievements Metrics
        uses: lowlighter/metrics@latest
        with:
          # 使用 GitHub Token 生成並提交
          token: ${{ secrets.GITHUB_TOKEN }}
          
          # 基本設定
          user: ${{ github.repository_owner }}
          template: classic
          base: "" # 我們只需要成就，不包含基本數據
          filename: github-metrics-achievements.svg
          
          # 成就插件配置
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          
          # 內建提交與推送功能 (取代原本的 ghaction-github-pages)
          output_action: commit
          committer_branch: output
          committer_message: "chore: update achievements metrics"
          
          # 時區與排序
          config_timezone: Asia/Taipei
          config_order: achievements
