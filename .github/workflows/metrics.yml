name: Metrics Achievements

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Achievements Metrics
        uses: lowlighter/metrics@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ${{ github.repository_owner }}
          template: classic
          base: header
          filename: github-metrics-achievements.svg
          
          # 成就插件
          plugin_achievements: yes
          plugin_achievements_display: detailed
          
          # 內建推送
          output_action: commit
          committer_branch: output
          committer_message: "chore: update achievements metrics"
          
          # 全域設定
          config_timezone: Asia/Taipei
          # 即使遇到 API 錯誤也強制輸出（嘗試解決 Projects deprecation 導致的崩潰）
          output_condition: always
          
          debug: yes
