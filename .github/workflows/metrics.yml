name: Metrics Achievements

on:
  schedule:
    - cron: "0 22 * * *" # Runs daily at 22:00 UTC
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Achievements Metrics
        uses: lowlighter/metrics@latest
        with:
          # You can use a personal access token (classic) with `read:user`, `read:org`, `repo` scopes
          # if you want to include private contributions or more detailed data.
          # For public data, GITHUB_TOKEN is sufficient.
          token: ${{ secrets.GITHUB_TOKEN }}
          
          # Options
          user: ${{ github.repository_owner }}
          template: classic
          base: "" # Do not include base metrics (we only want achievements)
          
          # Output file name
          filename: github-metrics-achievements.svg
          
          # Achievements plugin
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          
          # Customization to match Synthwave theme
          config_timezone: Asia/Taipei
          config_order: achievements

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: .
          fqdn: "" # Use default GitHub Pages domain if needed, but not necessary here
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
