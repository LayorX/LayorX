name: Metrics Achievements

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # 明確加入 projects 權限，嘗試修復 API 的 NOT_FOUND 錯誤
      projects: read
    steps:
      - name: Achievements Metrics
        # 改用 master 分支，通常包含對 GitHub API 變動的最新修復
        uses: lowlighter/metrics@master
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ${{ github.repository_owner }}
          template: classic
          base: header
          filename: github-metrics-achievements.svg
          
          # 成就插件
          plugin_achievements: yes
          plugin_achievements_display: detailed
          # 停用一些可能涉及舊版 API 的進階功能，確保穩定產出
          plugin_achievements_secrets: no
          
          # 內建推送
          output_action: commit
          committer_branch: output
          committer_message: "chore: update achievements metrics"
          
          config_timezone: Asia/Taipei
          config_order: achievements
          debug: yes
